name: data-update

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 3 * * *'
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install-deps
        run: pip install requests beautifulsoup4

      - name: create-data-dir
        run: mkdir -p data

      - name: fetch-today
        run: python quick_fetch.py today
        timeout-minutes: 30

      - name: run-predictions
        run: python auto_predict.py

      - name: commit-changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add race_db.json predictions.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "auto update data $(date -u +%Y-%m-%d)"
            git push
          fi
